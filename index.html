<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Empty Project</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
      padding: 2rem;
    }
    .card {
      max-width: 560px;
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
    }
    h1 {
      margin: 0 0 0.75rem;
      font-size: 1.75rem;
      font-weight: 700;
    }
    p {
      margin: 0 0 1rem;
      line-height: 1.6;
      color: #cbd5e1;
    }
    code {
      background: rgba(148, 163, 184, 0.15);
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      font-size: 0.9em;
    }
    .badge {
      display: inline-block;
      padding: 0.25rem 0.65rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: rgba(56, 189, 248, 0.15);
      color: #7dd3fc;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">Ready</span>
    <h1>Your project is empty</h1>
    <p>The repository imported successfully, but it doesn't contain any source code yet — just a basic Replit config file.</p>
    <p>Tell me what you'd like to build and I'll scaffold it for you. For example: <em>a React + Express todo app</em>, <em>a Python Flask API</em>, or <em>a static landing page</em>.</p>
  </div>
</body>
</html>
